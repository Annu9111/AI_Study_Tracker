{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<form action="/add" method="POST" class="form">
    <input type="text" name="subject" placeholder="Enter subject" required>
    <input type="number" name="time" placeholder="Time (minutes)" required>
    <button type="submit">Add Study</button>
</form>

<h3>Total Study Time: {{ total_time }} mins</h3>
<h3>⚡ Productivity: {{ productivity }}%</h3>
<div class="chart-container">
    <canvas id="myChart"></canvas>
</div>

<table class="table">
    <tr>
        <th>Subject</th>
        <th>Time</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }} mins</td>
        <td>{{ row[3][:10] }}</td>
        <td class="actions">
        <a href="/edit/{{ row[0] }}" class="edit-btn">Edit</a>
        <a href="/delete/{{ row[0] }}" class="delete-btn">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
<script>
const labels = {{ labels | tojson }};
const values = {{ values | tojson }};

if (labels.length > 0) {
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Study Time (mins)',
                data: values,
                borderWidth: 1
            }]
        }
    });
}
</script>
{% endblock %}
