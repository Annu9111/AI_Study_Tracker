{% extends "base.html" %}

{% block content %}

<h2>Dashboard</h2>

<form action="/add" method="POST" class="form">
    <input type="text" name="subject" placeholder="Enter subject" required>
    <input type="number" name="time" placeholder="Time (minutes)" required>
    <button type="submit">Add Study</button>
</form>

<h3>Total Study Time: {{ total_time }} mins</h3>

<table class="table">
    <tr>
        <th>Subject</th>
        <th>Time</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }} mins</td>
        <td>{{ row[3] }}</td>
        <td><a href="/delete/{{ row[0] }}" class="delete-btn">Delete</a></td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
